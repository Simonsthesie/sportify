name: CI - Sportify Pro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1 : Tests unitaires backend (Jest)
  # ============================================================
  test-backend:
    name: Backend - Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dependances
        working-directory: backend
        run: npm ci

      - name: Generer le client Prisma
        working-directory: backend
        env:
          DATABASE_URL: mysql://test:test@localhost:3306/test
        run: npx prisma generate

      - name: Verifier la compilation TypeScript
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lancer les tests Jest
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 1h
          DATABASE_URL: mysql://test:test@localhost:3306/test
          CORS_ORIGIN: http://localhost:5173
        run: npm test -- --coverage

      - name: Upload couverture de code
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/

  # ============================================================
  # Job 2 : Verification TypeScript frontend
  # ============================================================
  check-frontend:
    name: Frontend - TypeScript check + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dependances
        working-directory: frontend
        run: npm ci

      - name: Verifier TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build de production
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:4000/api
        run: npm run build

  # ============================================================
  # Job 3 : Validation Docker Compose
  # ============================================================
  validate-docker:
    name: Docker Compose - Validation YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valider le docker-compose.yml
        run: docker compose config --quiet
